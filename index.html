<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Database Dashboard</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .box { max-width: 650px; margin: 0 auto; background: #1e293b; padding: 35px; border-radius: 8px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #38bdf8; font-size: 1.4rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #334155; border: 1px solid #475569; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: #38bdf8; }
        
        .btn-container { display: flex; gap: 10px; }
        button { color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        
        .submit-btn { background: #10b981; }
        .submit-btn:hover { background: #059669; }
        
        .update-btn { background: #eab308; }
        .update-btn:hover { background: #ca8a04; }
        
        .cancel-btn { background: #64748b; }
        .cancel-btn:hover { background: #475569; }

        table { width: 100%; border-collapse: collapse; margin-top: 35px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
        
        .action-edit-btn { background: transparent; color: #eab308; border: 1px solid rgba(234,179,8,0.4); padding: 6px 14px; border-radius: 4px; font-size: 0.85rem; margin-right: 5px; cursor: pointer; }
        .action-edit-btn:hover { background: rgba(234,179,8,0.1); }
        
        .action-del-btn { background: transparent; color: #ef4444; border: 1px solid rgba(239,68,68,0.4); padding: 6px 14px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
        .action-del-btn:hover { background: rgba(239,68,68,0.1); }
        
        .badge-sno { background: rgba(56, 189, 248, 0.12); color: #38bdf8; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2 id="formTitle">Student Registry Entry</h2>
    <div>
        <input type="hidden" id="studentId">

        <label>Student Name</label>
        <input type="text" id="name" placeholder="Ex: Sai Kumar" style="text-transform: capitalize;" required autocomplete="off">
        
        <label>Grade Level</label>
        <input type="text" id="grade" placeholder="Ex: A+" style="text-transform: uppercase;" required autocomplete="off">
        
        <div class="btn-container">
            <button id="submitBtn" class="submit-btn">Submit</button>
            <button id="updateBtn" class="update-btn" style="display: none;">Update Existing</button>
            <button id="cancelBtn" class="cancel-btn" style="display: none;">Cancel</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Student Name</th>
                <th>Grade</th>
                <th style="text-align: center;">Operations</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- 🔗 LINK TO EXTERNAL SCRIPT -->
<script src="app.js"></script>
</body>
</html>
